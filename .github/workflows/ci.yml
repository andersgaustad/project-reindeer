name: Build and Release

on:
  push:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  GODOT_VERSION: 4.4
  EXPORT_NAME: project-reindeer
  PROJECT_PATH: godot/project-reindeer
  LINUX_NAME: linux-x86_64
  WINDOWS_NAME: windows
  MAC_OS_NAME: macos

jobs:
  cargo-build:
    name : Cargo Build - ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout 
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.4
          
      - name: Build
        run: cargo build --release --verbose

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-raw-rust-build
          path: target/release/*project_reindeer*
    
  godot-export:
    needs: cargo-build
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.4

    steps:
      - name: Checkout 
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup
        run: |
          mkdir -v -p target/release
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mkdir -v -p build/$LINUX_NAME
          mkdir -v -p build/$WINDOWS_NAME
          mkdir -v -p build/$MAC_OS_NAME
      
      - name: Download
        uses: actions/download-artifact@v7
        with:
          path: target/release

      - name: Enter Godot project
        run: cd $PROJECT_PATH
        
      - name: Build Linux
        run: |
          ls
          ls ../build/
          godot --headless --verbose --export-release "$LINUX_NAME" "../build/$LINUX_NAME/$LINUX_NAME.x86_64"

      - name: Upload Linux
        uses: actions/upload-artifact@v7
        with:
          name: $LINUX_NAME
          path: ../build/$LINUX_NAME

      - name: Build Windows
        run: godot --headless --verbose --export-release "$WINDOWS_NAME" "../build/$WINDOWS_NAME/$WINDOWS_NAME.exe"

      - name: Upload Windows
        uses: actions/upload-artifact@v7
        with:
          name: $WINDOWS_NAME
          path: ../build/$WINDOWS_NAME

      - name: Build Mac
        run: godot --headless --verbose --export-release "$MAC_OS_NAME" "../build/$MAC_OS_NAME/$MAC_OS_NAME.zip"
        
      - name: Upload MacOS
        uses: actions/upload-artifact@v7
        with:
          name: $MAC_OS_NAME
          path: ../build/$MAC_OS_NAME
